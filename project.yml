name: Tempo
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: labs.kurousagi.tempo
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Tempo:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_NAME: Tempo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
    scheme:
      testTargets:
        - TempoTests
        - TempoUITests
  TempoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Tempo
  TempoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Tempo
    settings:
      base:
        TEST_TARGET_NAME: Tempo
