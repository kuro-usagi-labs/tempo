name: iOS build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install project generator
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Run deterministic domain tests
        run: swift test
      - name: Enforce local-only networking policy
        run: |
          ! rg --glob '*.swift' 'URLSession|NWConnection|Alamofire' App Sources
      - name: Compile app for simulator
        run: xcodebuild build -project Tempo.xcodeproj -scheme Tempo -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO
      - name: Build archive
        run: xcodebuild archive -project Tempo.xcodeproj -scheme Tempo -configuration Release -destination 'generic/platform=iOS' -archivePath "$PWD/build/Tempo.xcarchive" -sdk iphoneos CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Create sideload-ready IPA artifact
        run: |
          set -euo pipefail
          app_path="build/Tempo.xcarchive/Products/Applications/Tempo.app"
          test -d "$app_path"
          /usr/bin/codesign --force --deep --sign - --timestamp=none "$app_path"
          /usr/bin/codesign --verify --deep --strict --verbose=2 "$app_path"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app_path/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundlePackageType' "$app_path/Info.plist"
          mkdir -p build/Payload
          cp -R "$app_path" build/Payload/
          (cd build && /usr/bin/zip -qry Tempo-sideload.ipa Payload)
      - uses: actions/upload-artifact@v4
        with:
          name: Tempo-sideload-ipa
          path: build/Tempo-sideload.ipa
          if-no-files-found: error
