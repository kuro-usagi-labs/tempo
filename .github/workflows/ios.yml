name: iOS build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-package:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install project generator
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Compile app for simulator
        run: |
          set -o pipefail
          xcodebuild build -project Tempo.xcodeproj -scheme Tempo -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log
          result=${PIPESTATUS[0]}
          if [ "$result" -ne 0 ]; then
            tail -n 40 build.log | while IFS= read -r line; do echo "::error::$line"; done
            exit "$result"
          fi
      - name: Upload compile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compile-diagnostics
          path: build.log
          if-no-files-found: warn
      - name: Build archive
        run: xcodebuild archive -project Tempo.xcodeproj -scheme Tempo -archivePath "$PWD/build/Tempo.xcarchive" -sdk iphoneos CODE_SIGNING_ALLOWED=NO
      - name: Create unsigned IPA artifact
        run: |
          mkdir -p build/Payload
          cp -R build/Tempo.xcarchive/Products/Applications/Tempo.app build/Payload/
          ditto -c -k --sequesterRsrc --keepParent build/Payload build/Tempo-unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: Tempo-unsigned-ipa
          path: build/Tempo-unsigned.ipa
          if-no-files-found: error
